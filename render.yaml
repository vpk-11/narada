services:
  - type: web
    name: narada
    runtime: python
    region: oregon
    plan: free
    pythonVersion: "3.12.0"

    buildCommand: |
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      cd frontend &&
      npm install &&
      npm run build

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: FORCE_HTTPS
        value: "true"
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: LOG_LEVEL
        value: WARNING
      - key: LLM_PROVIDER
        value: groq
      - key: SEARCH_PROVIDER
        value: tavily
      - key: OLLAMA_BASE_URL
        value: "http://localhost:11434"
      - key: OLLAMA_MODEL
        value: "llama3.2:3b"
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false